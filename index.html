<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCM.41.020.12.24</title>

  <!-- A-Frame -->
  <script src="js/aframe.js"></script>
  <!-- Custom beach components -->
  <script src="js/beach.js"></script>
  <script src="js/birds.js"></script>
  <script src="js/camera-controls.js"></script>
  <script src="js/teleport-controls.js"></script>
  <script src="js/pier-road.js"></script>
  <script src="js/pool.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb; }
    a-scene { width: 100%; height: 100%; }
  </style>
</head>

<body>
<!--
  ════════════════════════════════════════════════════════════
  UNIFIED Y-LEVEL REFERENCE (do not change without updating all):
    WATER_Y  = -0.5   → ocean entity sits at Y -0.5
    SAND     slopes from Y 0.58 (back) down to Y -0.44 (shore)
    LAND_Y   = 0.58   → land-pad baseY
    DUNES_Y  = 0.58   → dunes sit at same level as land/sand back
    ROCKS_Y  = -0.44  → rocks pinned to shoreline elevation
    FOAM_Y   = -0.43  → foam just above waterline
  ════════════════════════════════════════════════════════════
-->

<a-scene
  fog="type: exponential; color: #c8e8f5; density: 0.004"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; shadowMapEnabled: true; shadowMapType: PCFSoftShadowMap"
  shadow="type: pcfsoft"
  vr-mode-ui="enabled: true"
>

  <a-assets timeout="15000">
    <a-asset-item id="dream-beach-model" src="assets/dream-beach.glb"></a-asset-item>
    <a-asset-item id="palm-tree-model" src="assets/palm-tree.glb"></a-asset-item>
    <a-asset-item id="poly-trees-model" src="assets/poly-trees.glb"></a-asset-item>
  </a-assets>

  <!-- ══════════════════════════════════════
       SKY — textured sphere
  ═══════════════════════════════════════ -->
  <a-assets>
    <img id="sky-texture" src="assets/sky-texture.jpg" crossorigin="anonymous">
  </a-assets>
  <a-entity
    id="sky"
    geometry="primitive: sphere; radius: 400"
    material="src: #sky-texture; side: back; shader: flat"
    position="100 10 0"
  ></a-entity>


  <!-- ══════════════════════════════════════
       SUN — disc + soft glow halos
  ═══════════════════════════════════════ -->
  <!-- Outer glow -->
  <a-entity
    geometry="primitive: circle; radius: 9"
    material="color: #fce88a; shader: flat; transparent: true; opacity: 0.10"
    position="55 52 200"
  ></a-entity>
  <!-- Mid glow -->
  <a-entity
    geometry="primitive: circle; radius: 6"
    material="color: #fde6a0; shader: flat; transparent: true; opacity: 0.22"
    position="55 52 200"
  ></a-entity>
  <!-- Sun disc -->
  <a-entity
    geometry="primitive: circle; radius: 3.5"
    material="color: #fff8d0; shader: flat; transparent: true; opacity: 0.95"
    position="55 52 200"
  ></a-entity>


  <!-- ══════════════════════════════════════
       CLOUDS — scattered across the sky
  ═══════════════════════════════════════ -->
  <!-- Cloud cluster 1 -->
  <a-entity position="-80 65 -150">
    <a-entity geometry="primitive: sphere; radius: 8" material="color: #ffffff; transparent: true; opacity: 0.85; shader: flat" position="0 0 0"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 6" material="color: #ffffff; transparent: true; opacity: 0.75; shader: flat" position="-7 2 3"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 5" material="color: #ffffff; transparent: true; opacity: 0.70; shader: flat" position="8 1 -2"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 4" material="color: #ffffff; transparent: true; opacity: 0.65; shader: flat" position="5 -2 4"></a-entity>
  </a-entity>

  <!-- Cloud cluster 2 -->
  <a-entity position="120 72 -180">
    <a-entity geometry="primitive: sphere; radius: 10" material="color: #ffffff; transparent: true; opacity: 0.80; shader: flat" position="0 0 0"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 7" material="color: #ffffff; transparent: true; opacity: 0.70; shader: flat" position="-9 3 2"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 6" material="color: #ffffff; transparent: true; opacity: 0.65; shader: flat" position="10 2 -4"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 5" material="color: #ffffff; transparent: true; opacity: 0.60; shader: flat" position="6 -3 6"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 4" material="color: #ffffff; transparent: true; opacity: 0.55; shader: flat" position="-5 -1 -5"></a-entity>
  </a-entity>

  <!-- Cloud cluster 3 -->
  <a-entity position="-150 58 -120">
    <a-entity geometry="primitive: sphere; radius: 7" material="color: #ffffff; transparent: true; opacity: 0.82; shader: flat" position="0 0 0"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 5" material="color: #ffffff; transparent: true; opacity: 0.72; shader: flat" position="-6 1 2"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 6" material="color: #ffffff; transparent: true; opacity: 0.68; shader: flat" position="7 -2 -3"></a-entity>
  </a-entity>

  <!-- Cloud cluster 4 -->
  <a-entity position="60 80 -220">
    <a-entity geometry="primitive: sphere; radius: 9" material="color: #ffffff; transparent: true; opacity: 0.78; shader: flat" position="0 0 0"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 6" material="color: #ffffff; transparent: true; opacity: 0.68; shader: flat" position="-8 2 4"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 5" material="color: #ffffff; transparent: true; opacity: 0.62; shader: flat" position="9 -1 -2"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 4" material="color: #ffffff; transparent: true; opacity: 0.58; shader: flat" position="4 3 5"></a-entity>
  </a-entity>

  <!-- Cloud cluster 5 -->
  <a-entity position="-60 75 -250">
    <a-entity geometry="primitive: sphere; radius: 8" material="color: #ffffff; transparent: true; opacity: 0.80; shader: flat" position="0 0 0"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 6" material="color: #ffffff; transparent: true; opacity: 0.70; shader: flat" position="7 2 -3"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 5" material="color: #ffffff; transparent: true; opacity: 0.65; shader: flat" position="-6 -1 4"></a-entity>
  </a-entity>

  <!-- Cloud cluster 6 -->
  <a-entity position="180 68 -140">
    <a-entity geometry="primitive: sphere; radius: 7" material="color: #ffffff; transparent: true; opacity: 0.75; shader: flat" position="0 0 0"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 5" material="color: #ffffff; transparent: true; opacity: 0.65; shader: flat" position="-5 3 2"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 4" material="color: #ffffff; transparent: true; opacity: 0.60; shader: flat" position="6 -2 -2"></a-entity>
  </a-entity>

  <!-- Cloud cluster 7 -->
  <a-entity position="-120 70 -80">
    <a-entity geometry="primitive: sphere; radius: 9" material="color: #ffffff; transparent: true; opacity: 0.77; shader: flat" position="0 0 0"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 6" material="color: #ffffff; transparent: true; opacity: 0.67; shader: flat" position="-7 1 3"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 5" material="color: #ffffff; transparent: true; opacity: 0.62; shader: flat" position="8 -1 -4"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 4" material="color: #ffffff; transparent: true; opacity: 0.57; shader: flat" position="5 2 2"></a-entity>
  </a-entity>


  <!-- ══════════════════════════════════════
       LIGHTING
  ═══════════════════════════════════════ -->
  <!-- Primary warm sunlight — positioned to match sun disc -->
  <a-light
    type="directional"
    color="#fff5d8"
    intensity="2.4"
    position="55 52 200"
    cast-shadow="true"
    shadow-camera-left="-90"
    shadow-camera-right="90"
    shadow-camera-top="90"
    shadow-camera-bottom="-90"
    shadow-camera-near="1"
    shadow-camera-far="250"
    shadow-map-width="1024"
    shadow-map-height="1024"
    shadow-bias="-0.0005"
  ></a-light>

  <!-- Soft blue sky fill -->
  <a-light type="ambient" color="#b0d8f0" intensity="0.70"></a-light>

  <!-- Hemisphere: sky blue above, warm sand bounce below -->
  <a-light
    type="hemisphere"
    color="#88c8ee"
    ground-color="#c8aa50"
    intensity="0.55"
  ></a-light>


  <!-- ══════════════════════════════════════
       OCEAN  (Y = -0.5)
       Endless sea extending to horizon
  ═══════════════════════════════════════ -->
  <a-entity
    id="ocean"
    ocean-water="
      width: 2000;
      depth: 2000;
      widthSegments: 100;
      depthSegments: 100;
      amplitude: 0.14;
      speed: 0.48
    "
    position="0 -0.5 -500"
  ></a-entity>


  <!-- ══════════════════════════════════════
       BEACH SAND
       Center Z=0 so the front shore edge is at Z~+30 (shore)
       and the back edge is at Z~-30 (meeting land-pad).
       shoreY matches WATER_Y (-0.44 ≈ ocean surface accounting for waves)
       landY  matches LAND_Y  (0.58 = land-pad baseY)
  ═══════════════════════════════════════ -->
  <a-entity
    id="sand"
    beach-sand="
      width: 180;
      depth: 60;
      widthSegments: 110;
      depthSegments: 70;
      shoreY: -0.44;
      landY:   0.58
    "
    position="0 0 0"
  ></a-entity>


  <!-- ══════════════════════════════════════
       SAND DUNES  — at the back of the beach / land edge
       Positioned at Z = -22 (back of sand, front of land)
  ═══════════════════════════════════════ -->
  <a-entity
    id="dunes"
    beach-dunes="
      width: 180;
      depth: 16;
      widthSegments: 100;
      depthSegments: 16
    "
    position="0 0 -22"
  ></a-entity>


  <!-- ══════════════════════════════════════
       LAND PAD  — grassy elevated ground
       Starts behind the dunes at Z = -30
       baseY = 0.58 matches sand landY
  ═══════════════════════════════════════ -->
  <a-entity
    id="land"
    land-pad="
      width: 180;
      depth: 70;
      widthSegments: 80;
      depthSegments: 40;
      baseY: 0.58
    "
    position="0 0 -65"
  ></a-entity>


  <!-- ══════════════════════════════════════
       GLB MODEL — placed on green land
  ═══════════════════════════════════════ -->
  <a-entity
    id="model"
    gltf-model="#dream-beach-model"
    position="0 1 -78"
    scale="4 4 4"
  ></a-entity>

  <!-- ══════════════════════════════════════
       POOL — placed beside the house
  ═══════════════════════════════════════ -->
  <a-entity
    id="pool"
    pool-scene="position: 20 1 -65; scale: 1 1 1"
  ></a-entity>

  <!-- ══════════════════════════════════════
       PALM TREES — scattered around beach and land
       Avoiding the model at (0, 1, -78)
  ═══════════════════════════════════════ -->
  <!-- Palm trees close to house -->
  <a-entity gltf-model="#palm-tree-model" position="18 0.58 -90" scale="3 3 3" rotation="0 45 0"></a-entity>
  <a-entity gltf-model="#palm-tree-model" position="-18 0.58 -78" scale="3 3 3" rotation="0 -45 0"></a-entity>
  <!-- Beach palms -->
  <a-entity gltf-model="#palm-tree-model" position="25 -0.3 10" scale="3 3 3" rotation="0 45 0" model-loaded="console.log('palm loaded')" model-error="console.error('palm error')" ></a-entity>
  <a-entity gltf-model="#palm-tree-model" position="-30 -0.3 -5" scale="3 3 3" rotation="0 -30 0" model-loaded="console.log('palm loaded')" model-error="console.error('palm error')"></a-entity>
  <a-entity gltf-model="#palm-tree-model" position="40 -0.3 -15" scale="3 3 3" rotation="0 90 0" model-loaded="console.log('palm loaded')" model-error="console.error('palm error')"></a-entity>
  <a-entity gltf-model="#palm-tree-model" position="-45 -0.3 20" scale="3 3 3" rotation="0 15 0" model-loaded="console.log('palm loaded')" model-error="console.error('palm error')"></a-entity>
  <!-- Dune palms -->
  <a-entity gltf-model="#palm-tree-model" position="60 0.5 -25" scale="3 3 3" rotation="0 -45 0"></a-entity>
  <a-entity gltf-model="#palm-tree-model" position="-55 0.5 -20" scale="3 3 3" rotation="0 120 0"></a-entity>
  <!-- Land edge palms (avoiding model center at -78) -->
  <a-entity gltf-model="#palm-tree-model" position="80 0.5 -40" scale="3 3 3" rotation="0 30 0"></a-entity>
  <a-entity gltf-model="#palm-tree-model" position="-80 0.5 -35" scale="3 3 3" rotation="0 -60 0"></a-entity>
  <a-entity gltf-model="#palm-tree-model" position="85 0.5 -95" scale="3 3 3" rotation="0 0 0"></a-entity>
  <a-entity gltf-model="#palm-tree-model" position="-85 0.5 -100" scale="3 3 3" rotation="0 75 0"></a-entity>
  <!-- Additional land palms -->
  <a-entity gltf-model="#palm-tree-model" position="70 0.5 -55" scale="3 3 3" rotation="0 22 0"></a-entity>
  <a-entity gltf-model="#palm-tree-model" position="-75 0.5 -50" scale="3 3 3" rotation="0 -15 0"></a-entity>

  <!-- ══════════════════════════════════════
       POLY TREES — only on green land
       Avoiding the house model at (0, 1, -78)
  ═══════════════════════════════════════ -->
  <a-entity gltf-model="#poly-trees-model" position="40 0.58 -50" scale="0.009 0.009 0.009" rotation="0 20 0"></a-entity>
  <a-entity gltf-model="#poly-trees-model" position="-50 0.58 -60" scale="0.009 0.009 0.009" rotation="0 -40 0"></a-entity>
  <a-entity gltf-model="#poly-trees-model" position="60 0.58 -80" scale="0.009 0.009 0.009" rotation="0 60 0"></a-entity>
  <a-entity gltf-model="#poly-trees-model" position="-70 0.58 -75" scale="0.009 0.009 0.009" rotation="0 -10 0"></a-entity>
  <a-entity gltf-model="#poly-trees-model" position="30 0.58 -100" scale="0.009 0.009 0.009" rotation="0 45 0"></a-entity>
  <a-entity gltf-model="#poly-trees-model" position="-40 0.58 -95" scale="0.009 0.009 0.009" rotation="0 -70 0"></a-entity>
  <!-- Additional poly trees -->
  <a-entity gltf-model="#poly-trees-model" position="50 0.58 -65" scale="0.009 0.009 0.009" rotation="0 15 0"></a-entity>
  <a-entity gltf-model="#poly-trees-model" position="-60 0.58 -85" scale="0.009 0.009 0.009" rotation="0 80 0"></a-entity>
  <a-entity gltf-model="#poly-trees-model" position="25 0.58 -45" scale="0.009 0.009 0.009" rotation="0 -25 0"></a-entity>
  <a-entity gltf-model="#poly-trees-model" position="-25 0.58 -55" scale="0.009 0.009 0.009" rotation="0 55 0"></a-entity>
  <a-entity gltf-model="#poly-trees-model" position="45 0.58 -90" scale="0.009 0.009 0.009" rotation="0 -50 0"></a-entity>
  <a-entity gltf-model="#poly-trees-model" position="-55 0.58 -40" scale="0.009 0.009 0.009" rotation="0 35 0"></a-entity>

  <!-- ══════════════════════════════════════
       SHORELINE FOAM  — sits right at waterline
       Y = -0.43 (just above ocean surface)
       Z = +26 = front edge of beach / start of ocean
  ═══════════════════════════════════════ -->
  <a-entity
    id="foam"
    foam-strip="width: 180; speed: 0.40"
    position="0 -0.43 26"
  ></a-entity>


  <!-- ══════════════════════════════════════
       SHORELINE ROCKS  — half-embedded at waterline
       baseY = -0.44 (waterline level, rocks embed upward)
  ═══════════════════════════════════════ -->
  <a-entity
    id="rocks"
    scatter-rocks="
      count:  32;
      rangeX: 65;
      rangeZ:  5;
      baseY: -0.44
    "
    position="0 0 26"
  ></a-entity>


  <!-- ══════════════════════════════════════
       PIER ROAD — Coastal road extending from beach (Z=10) to sea (Z=500)
       Creates illusion of connection to distant land
  ═══════════════════════════════════════ -->
  <a-entity
    id="pier-road"
    pier-road="startZ: 0; endZ: 350; width: 6; deckHeight: 2.0; pillarSpacing: 12"
    position="0 0 0"
  ></a-entity>

  <!-- ══════════════════════════════════════
       DISTANT MOUNTAINS — faint silhouette behind the model
  ═══════════════════════════════════════ -->
  <a-entity
    geometry="primitive: plane; width: 600; height: 80"
    material="color: #4a5568; transparent: true; opacity: 0.15; shader: flat; depthWrite: false"
    position="0 25 -250"
    rotation="0 0 0"
  ></a-entity>
  <a-entity
    geometry="primitive: plane; width: 400; height: 60"
    material="color: #4a5568; transparent: true; opacity: 0.12; shader: flat; depthWrite: false"
    position="-200 20 -240"
    rotation="0 15 0"
  ></a-entity>
  <a-entity
    geometry="primitive: plane; width: 450; height: 70"
    material="color: #4a5568; transparent: true; opacity: 0.13; shader: flat; depthWrite: false"
    position="180 22 -245"
    rotation="0 -10 0"
  ></a-entity>

  <!-- ══════════════════════════════════════
       HORIZON ATMOSPHERE
       Large vertical plane at far horizon to blend sea and sky
  ═══════════════════════════════════════ -->
  <a-entity
    geometry="primitive: plane; width: 400; height: 30"
    material="color: #b8e8fa; transparent: true; opacity: 0.14; shader: flat; depthWrite: false"
    position="0 8 -200"
    rotation="0 0 0"
  ></a-entity>



  <!-- ══════════════════════════════════════
       BIRDS — flying around the beach
  ═══════════════════════════════════════ -->
  <a-entity bird-flock="count: 15"></a-entity>

  <!-- Distant birds flying across horizon -->
  <a-entity distant-bird="speed: 12; height: 50; startX: -150; endX: 150" position="0 0 0"></a-entity>
  <a-entity distant-bird="speed: 10; height: 55; startX: -150; endX: 150" position="0 0 -20"></a-entity>
  <a-entity distant-bird="speed: 14; height: 48; startX: -150; endX: 150" position="0 0 20"></a-entity>

  <!-- ══════════════════════════════════════
       CAMERA RIG — VR + Desktop support
  ═══════════════════════════════════════ -->
  <a-entity
    id="camera-rig"
    position="1 4 35"
    rotation="0 0 0"
    camera-controls="moveSpeed: 5; lookSpeed: 0.5"
    movement-controls="fly: false"
    navigator="cameraRig: #camera-rig; cameraHead: #main-camera; fly: false"
  >
    <a-camera
      id="main-camera"
      fov="72"
      near="0.05"
      far="600"
      look-controls="pointerLockEnabled: false"
      wasd-controls="enabled: false"
    ></a-camera>

    <!-- VR Hand Controllers -->
    <a-entity
      id="left-hand"
      hand-controls="hand: left"
      laser-controls="hand: left"
      raycaster="objects: .clickable; far: 20"
      teleport-controls="cameraRig: #camera-rig; teleportOrigin: #main-camera; button: thumbstick; curve: line; collisionEntities: #sand, #land, #dunes"
    ></a-entity>
    <a-entity
      id="right-hand"
      hand-controls="hand: right"
      laser-controls="hand: right"
      raycaster="objects: .clickable; far: 20"
      teleport-controls="cameraRig: #camera-rig; teleportOrigin: #main-camera; button: thumbstick; curve: line; collisionEntities: #sand, #land, #dunes"
    ></a-entity>
  </a-entity>

</a-scene>
</body>
</html>
